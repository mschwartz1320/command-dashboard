name: Playwright QA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  qa:
    name: Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Wait for GitHub Pages to be live
        run: |
          echo "Waiting for GitHub Pages deployment..."
          MAX_RETRIES=20
          RETRY_DELAY=15
          URL="https://mschwartz1320.github.io/command-dashboard/"
          for i in $(seq 1 $MAX_RETRIES); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            echo "Attempt $i/$MAX_RETRIES — HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "GitHub Pages is live!"
              break
            fi
            if [ "$i" = "$MAX_RETRIES" ]; then
              echo "GitHub Pages not ready after $MAX_RETRIES attempts. Running tests anyway..."
            fi
            sleep $RETRY_DELAY
          done

      - name: Run Playwright tests
        run: npx playwright test --reporter=list,html
        env:
          CI: true

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload screenshots and traces on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-artifacts
          path: |
            test-results/
          retention-days: 14
