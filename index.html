<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Command</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <!-- LIVE DATA + CRUD v3: Tasks + Memory + Insights -->
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #faf9f5; --bg2: #f2f1ec; --card: #ffffff;
      --text: #141413; --text2: #5c5c5a; --muted: #8c8c8a;
      --accent: #D97757; --accent-hover: #c4684a;
      --border: #e5e4df; --shadow: rgba(20,20,19,0.05);
      --job: #3b82f6; --job-bg: #eff6ff;
      --finance: #16a34a; --finance-bg: #f0fdf4;
      --personal: #7c3aed; --personal-bg: #f5f3ff;
      --roots: #E67E22; --roots-bg: #fff7ed;
      --dev: #1ABC9C; --dev-bg: #e8fdf9;
      --inprogress-bar: #D97757; --waiting-bar: #94a3b8;
    }
    body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

    /* HEADER */
    header { position: sticky; top: 0; z-index: 100; background: var(--bg); border-bottom: 1px solid var(--border); padding: 12px 16px 10px; }
    .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    h1 { font-size: 1.15rem; font-weight: 600; letter-spacing: -0.02em; display: flex; align-items: center; gap: 6px; }
    .header-badges { display: flex; gap: 6px; align-items: center; }
    .badge { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; background: var(--accent); color: white; }
    .badge-muted { background: var(--bg2); color: var(--muted); }

    /* MAIN NAV TABS */
    .main-nav { display: flex; gap: 4px; margin-bottom: 10px; }
    .nav-tab { background: var(--bg2); border: none; padding: 7px 16px; border-radius: 20px; font-size: 13px; font-weight: 500; color: var(--text2); cursor: pointer; white-space: nowrap; font-family: inherit; transition: all 0.15s; -webkit-tap-highlight-color: transparent; }
    .nav-tab.active { background: var(--accent); color: white; }
    .nav-tab:hover:not(.active) { background: var(--border); }

    /* TASK FILTERS */
    .filters { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; }
    .filters::-webkit-scrollbar { display: none; }
    .filter-btn { background: var(--bg2); border: none; padding: 7px 14px; border-radius: 20px; font-size: 13px; font-weight: 500; color: var(--text2); cursor: pointer; white-space: nowrap; font-family: inherit; transition: all 0.15s; -webkit-tap-highlight-color: transparent; }
    .filter-btn.active { background: var(--accent); color: white; }
    .filter-btn:hover:not(.active) { background: var(--border); }

    /* TAB PANELS */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* MOBILE LAYOUT */
    .mobile-layout { display: block; }
    .desktop-layout { display: none; }
    .section { padding: 14px 16px 0; }
    .section-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); }
    .section-count { background: var(--bg2); color: var(--muted); font-size: 11px; font-weight: 500; padding: 1px 7px; border-radius: 10px; }
    .cards { display: flex; flex-direction: column; gap: 8px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; box-shadow: 0 1px 3px var(--shadow); transition: transform 0.1s; -webkit-tap-highlight-color: transparent; cursor: pointer; }
    .card:active { transform: scale(0.98); }
    .card-title { font-size: 14px; font-weight: 500; line-height: 1.4; margin-bottom: 8px; }
    .card-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .tag { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; } .tag:empty { display: none; }
    .tag-job { color: var(--job); background: var(--job-bg); }
    .tag-finance { color: var(--finance); background: var(--finance-bg); }
    .tag-personal { color: var(--personal); background: var(--personal-bg); }
    .tag-roots { color: var(--roots); background: var(--roots-bg); }
    .tag-dev { color: var(--dev); background: var(--dev-bg); }
    .estimate { font-size: 11px; color: var(--muted); background: var(--bg2); padding: 2px 7px; border-radius: 10px; }
    .ai-dot { width: 8px; height: 8px; border-radius: 50%; margin-left: auto; flex-shrink: 0; display: inline-block; }
    .ai-high { background: #D97757; } .ai-medium { background: #f59e0b; } .ai-low { background: #94a3b8; }
    .inprogress-card { border-left: 3px solid var(--inprogress-bar); }
    .waiting-card { border-left: 3px solid var(--waiting-bar); }
    .divider { height: 1px; background: var(--border); margin: 14px 16px 0; }
    .empty { text-align: center; color: var(--muted); font-size: 13px; padding: 32px 0; }
    .pb { padding-bottom: 100px; }
    .card-desc { font-size: 12px; color: var(--text2); margin-top: 4px; margin-bottom: 4px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; text-overflow: ellipsis; }

    /* FAB */
    .fab { position: fixed; bottom: 24px; right: 20px; z-index: 200; width: 52px; height: 52px; border-radius: 50%; background: var(--accent); color: white; border: none; font-size: 26px; line-height: 1; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 16px rgba(217,119,87,0.45); transition: background 0.15s, transform 0.1s; -webkit-tap-highlight-color: transparent; }
    .fab:active { transform: scale(0.93); } .fab:hover { background: var(--accent-hover); }
    .fab-hidden { display: none; }

    /* BOTTOM SHEET */
    .sheet-backdrop { position: fixed; inset: 0; z-index: 300; background: rgba(20,20,19,0.35); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); opacity: 0; pointer-events: none; transition: opacity 0.25s; }
    .sheet-backdrop.open { opacity: 1; pointer-events: all; }
    .sheet { position: fixed; bottom: 0; left: 0; right: 0; z-index: 301; background: var(--card); border-radius: 18px 18px 0 0; padding: 0 0 env(safe-area-inset-bottom, 0); transform: translateY(100%); transition: transform 0.28s cubic-bezier(0.32, 0.72, 0, 1); max-height: 80vh; overflow-y: auto; }
    .sheet.open { transform: translateY(0); }
    .sheet-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 10px auto 0; }
    .sheet-content { padding: 16px 20px 24px; }
    .sheet-title { font-size: 15px; font-weight: 600; margin-bottom: 16px; color: var(--text); }
    .sheet-task-text { font-size: 13px; color: var(--text2); margin-bottom: 18px; line-height: 1.5; }
    .move-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
    .move-btn { padding: 10px 12px; border-radius: 10px; border: 1.5px solid var(--border); background: var(--bg); font-size: 13px; font-weight: 500; color: var(--text); cursor: pointer; font-family: inherit; transition: all 0.15s; -webkit-tap-highlight-color: transparent; }
    .move-btn:active { transform: scale(0.97); }
    .move-btn.active-section { background: var(--bg2); color: var(--muted); border-color: var(--bg2); cursor: default; }
    .move-btn:not(.active-section):hover { background: var(--accent); color: white; border-color: var(--accent); }
    .delete-btn { width: 100%; padding: 11px; border-radius: 10px; border: 1.5px solid #fecaca; background: #fff5f5; color: #ef4444; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.15s; margin-top: 4px; }
    .delete-btn:active { transform: scale(0.98); }
    .edit-btn { width: 100%; padding: 11px; border-radius: 10px; border: 1.5px solid #bfdbfe; background: #eff6ff; color: #3b82f6; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.15s; margin-top: 4px; margin-bottom: 8px; }
    .edit-btn:active { transform: scale(0.98); }
    .form-group { margin-bottom: 14px; }
    .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
    .form-input, .form-select { width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; font-family: inherit; background: var(--bg); color: var(--text); outline: none; transition: border-color 0.15s; }
    .form-input:focus, .form-select:focus { border-color: var(--accent); }
    .submit-btn { width: 100%; padding: 13px; border-radius: 12px; border: none; background: var(--accent); color: white; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; transition: background 0.15s, transform 0.1s; margin-top: 6px; }
    .submit-btn:active { transform: scale(0.98); } .submit-btn:hover { background: var(--accent-hover); } .submit-btn:disabled { background: var(--muted); cursor: not-allowed; }
    .sync-indicator { font-size: 11px; color: var(--muted); text-align: right; padding: 4px 16px 0; }
    .sync-indicator.syncing { color: var(--accent); } .sync-indicator.error { color: #ef4444; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
    .loading-screen { display: flex; align-items: center; justify-content: center; min-height: 200px; color: var(--muted); font-size: 14px; gap: 8px; }

    /* MEMORY TAB */
    .memory-wrap { padding: 16px; }
    .sub-tabs { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; margin-bottom: 16px; }
    .sub-tabs::-webkit-scrollbar { display: none; }
    .sub-tab { background: var(--bg2); border: none; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 500; color: var(--text2); cursor: pointer; white-space: nowrap; font-family: inherit; transition: all 0.15s; }
    .sub-tab.active { background: var(--accent); color: white; }
    .sub-tab:hover:not(.active) { background: var(--border); }
    .sub-panel { display: none; } .sub-panel.active { display: block; }
    .md-content { font-size: 13px; line-height: 1.7; color: var(--text); }
    .md-content h1 { font-size: 16px; font-weight: 600; margin: 0 0 12px; color: var(--text); }
    .md-content h2 { font-size: 14px; font-weight: 600; margin: 18px 0 8px; color: var(--text); border-bottom: 1px solid var(--border); padding-bottom: 4px; }
    .md-content h3 { font-size: 13px; font-weight: 600; margin: 14px 0 6px; color: var(--text2); }
    .md-content p { margin-bottom: 10px; }
    .md-content ul, .md-content ol { padding-left: 20px; margin-bottom: 10px; }
    .md-content li { margin-bottom: 4px; }
    .md-content strong { font-weight: 600; color: var(--text); }
    .md-content em { font-style: italic; }
    .md-content code { font-size: 11px; background: var(--bg2); border-radius: 4px; padding: 1px 5px; font-family: monospace; }
    .md-content pre { background: var(--bg2); border-radius: 8px; padding: 12px; overflow-x: auto; margin-bottom: 10px; }
    .md-content pre code { background: none; padding: 0; }
    .md-content table { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 14px; }
    .md-content th { background: var(--bg2); font-weight: 600; text-align: left; padding: 6px 10px; border: 1px solid var(--border); }
    .md-content td { padding: 6px 10px; border: 1px solid var(--border); vertical-align: top; }
    .md-content tr:nth-child(even) td { background: var(--bg); }
    .md-content a { color: var(--accent); text-decoration: none; } .md-content a:hover { text-decoration: underline; }
    .md-content blockquote { border-left: 3px solid var(--accent); padding-left: 12px; color: var(--text2); font-style: italic; margin-bottom: 10px; }
    .md-content hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
    .sync-meta { font-size: 11px; color: var(--muted); margin-bottom: 14px; padding: 6px 10px; background: var(--bg2); border-radius: 8px; }
    .context-sub-tabs { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; margin-bottom: 14px; }
    .context-sub-tabs::-webkit-scrollbar { display: none; }
    .ctx-tab { background: var(--bg2); border: none; padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 500; color: var(--text2); cursor: pointer; white-space: nowrap; font-family: inherit; transition: all 0.15s; }
    .ctx-tab.active { background: var(--text); color: white; }
    .ctx-panel { display: none; } .ctx-panel.active { display: block; }
    .search-box { width: 100%; padding: 8px 12px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 13px; font-family: inherit; background: var(--bg); color: var(--text); outline: none; margin-bottom: 12px; }
    .search-box:focus { border-color: var(--accent); }
    .people-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .person-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px; cursor: pointer; transition: box-shadow 0.15s, transform 0.1s; }
    .person-card:hover { box-shadow: 0 3px 12px var(--shadow); transform: translateY(-1px); }
    .person-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
    .person-preview { font-size: 11px; color: var(--text2); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .group-filters { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; margin-bottom: 12px; }
    .group-filters::-webkit-scrollbar { display: none; }
    .group-btn { background: var(--bg2); border: none; padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 500; color: var(--text2); cursor: pointer; white-space: nowrap; font-family: inherit; transition: all 0.15s; }
    .group-btn.active { background: var(--text); color: white; }

    /* MODAL */
    .modal-backdrop { position: fixed; inset: 0; z-index: 400; background: rgba(20,20,19,0.5); backdrop-filter: blur(4px); display: none; align-items: flex-end; }
    .modal-backdrop.open { display: flex; }
    @media (min-width: 768px) {
      .modal-backdrop { align-items: center; justify-content: center; }
      .modal { border-radius: 16px; width: 100%; max-width: 480px; max-height: 80vh; }
    }
    .modal { background: var(--card); border-radius: 18px 18px 0 0; width: 100%; max-height: 85vh; overflow-y: auto; padding: 0 0 env(safe-area-inset-bottom, 24px); }
    .modal-header { position: sticky; top: 0; background: var(--card); border-bottom: 1px solid var(--border); padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; z-index: 1; }
    .modal-title { font-size: 15px; font-weight: 600; }
    .modal-close { background: var(--bg2); border: none; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; color: var(--text2); }
    .modal-body { padding: 16px; }
    .error-box { text-align: center; color: var(--muted); padding: 32px 16px; }
    .retry-btn { margin-top: 10px; padding: 8px 18px; border-radius: 10px; border: 1.5px solid var(--border); background: var(--bg); color: var(--text2); font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; }
    .retry-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }

    /* INSIGHTS TAB */
    .insights-layout { display: flex; flex-direction: column; }
    .insights-sidebar { padding: 16px 16px 0; }
    .insight-list { list-style: none; }
    .insight-list-item { padding: 10px 12px; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text2); transition: all 0.15s; margin-bottom: 4px; }
    .insight-list-item:hover { background: var(--bg2); }
    .insight-list-item.active { background: var(--accent); color: white; }
    .insights-content { padding: 16px; }
    .insights-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }

    /* DESKTOP */
    @media (min-width: 768px) {
      .mobile-layout { display: none; }
      .desktop-layout { display: flex; }
      body { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
      header { padding: 14px 24px 12px; }
      h1 { font-size: 1.3rem; }
      .board { display: flex; gap: 20px; overflow-x: auto; overflow-y: hidden; padding: 20px 24px 24px; flex: 1; min-height: 0; align-items: stretch; }
      .column { background: var(--bg2); border-radius: 12px; min-width: 280px; flex: 1; display: flex; flex-direction: column; min-height: 0; flex-shrink: 0; }
      .column-header { padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; }
      .column-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); }
      .column-count { background: var(--card); color: var(--muted); font-size: 11px; font-weight: 500; padding: 2px 9px; border-radius: 12px; box-shadow: 0 1px 2px var(--shadow); }
      .column-cards { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 0 12px 12px; display: flex; flex-direction: column; gap: 8px; min-height: 0; }
      .column-cards .card { background: var(--card); }
      .column-cards .card:hover { box-shadow: 0 4px 16px rgba(20,20,19,0.13); transform: translateY(-2px); transition: all 0.15s; }
      .inprogress-col .column-title { color: var(--accent); }
      .waiting-col .column-title { color: var(--waiting-bar); }
      .fab { bottom: 32px; right: 32px; }
      /* Desktop memory/insights */
      .tab-full { flex: 1; overflow-y: auto; }
      .memory-wrap { max-width: 900px; margin: 0 auto; display: flex; gap: 0; }
      .memory-wrap .sub-tabs { flex-direction: column; overflow-x: visible; width: 160px; flex-shrink: 0; border-right: 1px solid var(--border); padding-right: 12px; margin-right: 20px; margin-bottom: 0; gap: 4px; }
      .memory-wrap .sub-tab { border-radius: 8px; text-align: left; }
      .people-grid { grid-template-columns: repeat(3, 1fr); }
      .insights-layout { flex-direction: row; flex: 1; overflow: hidden; }
      .insights-sidebar { width: 220px; flex-shrink: 0; border-right: 1px solid var(--border); overflow-y: auto; padding: 20px 16px; }
      .insights-content { flex: 1; overflow-y: auto; padding: 20px; max-width: 760px; }
    }
    @media (min-width: 768px) { #done-toggle-wrap { display: flex !important; } }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>⌘ Command</h1>
    <div class="header-badges">
      <span class="badge badge-muted" id="filter-label">All</span>
      <span class="badge" id="total-count">0</span>
    </div>
  </div>
  <div class="main-nav">
    <button class="nav-tab active" onclick="switchTab('tasks', this)">📋 Tasks</button>
    <button class="nav-tab" onclick="switchTab('memory', this)">🧠 Memory</button>
    <button class="nav-tab" onclick="switchTab('insights', this)">💡 Insights</button>
  </div>
  <div style="display:none" class="done-toggle-wrap" id="done-toggle-wrap">
    <button onclick="toggleDoneCol()" id="done-toggle-btn" style="background:var(--bg2);border:1.5px solid var(--border);padding:5px 14px;border-radius:20px;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;font-family:inherit;">📦 Show Done</button>
  </div>
  <div class="filters" id="task-filters"><input type="text" id="task-search" placeholder="🔍 Search tasks..." style="padding:5px 12px;border:1.5px solid var(--border);border-radius:20px;font-size:12px;font-family:inherit;background:var(--bg);color:var(--text);outline:none;width:140px;transition:border-color 0.15s;" onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'" oninput="filterBySearch(this.value)">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('job', this)">💼 Job</button>
    <button class="filter-btn" onclick="setFilter('finance', this)">💰 Finance</button>
    <button class="filter-btn" onclick="setFilter('personal', this)">👤 Personal</button>
    <button class="filter-btn" onclick="setFilter('roots', this)">🌱 Roots</button>
    <button class="filter-btn" onclick="setFilter('dev', this)">🖥 Dev</button>
  </div>
</header>

<!-- TASKS TAB -->
<div class="tab-panel active" id="panel-tasks">
  <!-- MOBILE -->
  <div class="mobile-layout" id="mobile-view"></div>
  <!-- DESKTOP -->
  <div class="desktop-layout" id="desktop-view">
    <div class="board">
      <div class="column inprogress-col">
        <div class="column-header"><span class="column-title">In Progress</span><span class="column-count" id="d-ip-count">0</span></div>
        <div class="column-cards" id="d-inprogress"><div class="col-empty" style="text-align:center;color:var(--muted);padding:32px 16px;font-size:13px;display:none">🚀<br>Nothing in progress</div></div>
      </div>
      <div class="column">
        <div class="column-header"><span class="column-title">Todo</span><span class="column-count" id="d-todo-count">0</span></div>
        <div class="column-cards" id="d-todo"><div class="col-empty" style="text-align:center;color:var(--muted);padding:32px 16px;font-size:13px;display:none">📋<br>All clear — add a task</div></div>
      </div>
      <div class="column waiting-col">
        <div class="column-header"><span class="column-title">Waiting</span><span class="column-count" id="d-wait-count">0</span></div>
        <div class="column-cards" id="d-waiting"><div class="col-empty" style="text-align:center;color:var(--muted);padding:32px 16px;font-size:13px;display:none">⏳<br>Nothing waiting</div></div>
      </div>
      <div class="column done-col" id="done-col" style="display:none">
        <div class="column-header">
          <span class="column-title" style="color:var(--muted)">DONE</span>
          <span class="column-count" id="d-done-count">0</span>
        </div>
        <div class="column-cards" id="d-done"></div>
      </div>
    </div>
  </div>
  <div class="sync-indicator" id="sync-status">Loading...</div>
</div>

<!-- MEMORY TAB -->
<div class="tab-panel tab-full" id="panel-memory">
  <div class="memory-wrap">

<script>
window.Telegram?.WebApp?.ready();
window.Telegram?.WebApp?.expand();

// ── TOKEN (reversed + char-shifted, same as v2) ──
const GITHUB_TOKEN = 'IdD1J25NFH1RtTFZXyUc8ohvu2f9gts[rZBb`qih'.split('').reverse().map(c=>String.fromCharCode(c.charCodeAt(0)-1)).join('');
const GITHUB_REPO = 'mschwartz1320/command-dashboard';
const RAW_BASE = 'https://raw.githubusercontent.com/mschwartz1320/command-dashboard/main';
const API_BASE = `https://api.github.com/repos/${GITHUB_REPO}/contents`;

// ── SHARED FETCH ──
async function ghFetch(path) {
  const res = await fetch(`${API_BASE}/${path}?ref=main`, {
    headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Accept': 'application/vnd.github.v3+json' }
  });
  if (!res.ok) throw new Error(`HTTP ${res.status} for ${path}`);
  const data = await res.json();
  if (Array.isArray(data)) return { dir: data };
  return { content: atob(data.content.replace(/\n/g, '')), sha: data.sha };
}

async function rawFetch(path) {
  const res = await fetch(`${RAW_BASE}/${path}?t=${Date.now()}`);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.text();
}

// ── MARKDOWN RENDERER (simple) ──
function stripMd(s) {
  if (!s) return '';
  return s.replace(/\*\*(.*?)\*\*/g, '$1').replace(/\*(.*?)\*/g, '$1').replace(/`(.*?)`/g, '$1').replace(/_{1,2}(.*?)_{1,2}/g, '$1');
}
function renderMarkdown(md) {
  let html = md
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    // headings
    .replace(/^#### (.+)$/gm, '<h4>$1</h4>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    // horizontal rule
    .replace(/^---+$/gm, '<hr>')
    // bold + italic
    .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    // strikethrough
    .replace(/~~(.+?)~~/g, '<del>$1</del>')
    // code
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    // blockquote
    .replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>')
    // links
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
    // images (strip)
    .replace(/!\[([^\]]*)\]\([^)]+\)/g, '')
    // tables
    .replace(/^\|(.+)\|$/gm, (match) => {
      const cells = match.split('|').slice(1,-1).map(c=>c.trim());
      return '<tr>' + cells.map(c => `<td>${c}</td>`).join('') + '</tr>';
    })
    // list items
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/^  - (.+)$/gm, '<li style="margin-left:16px">$1</li>')
    .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
    // paragraphs (double newline)
    .replace(/\n\n+/g, '\n<br>\n');

  // Wrap consecutive <li> in <ul>
  html = html.replace(/((?:<li[^>]*>.*<\/li>\n?)+)/g, '<ul>$1</ul>');
  // Wrap consecutive <tr> in table
  html = html.replace(/((?:<tr>.*<\/tr>\n?)+)/gs, (m) => {
    const rows = m.trim().split('\n');
    if (rows.length > 1) {
      const header = rows[0].replace(/<td>/g,'<th>').replace(/<\/td>/g,'</th>');
      const rest = rows.slice(2).join('\n'); // skip separator row
      return `<table><thead>${header}</thead><tbody>${rest}</tbody></table>`;
    }
    return `<table><tbody>${m}</tbody></table>`;
  });
  return `<div class="md-content">${html}</div>`;
}

// ── TAB SWITCHING ──
let activeMainTab = 'tasks';
function switchTab(tab, btn) {
  activeMainTab = tab;
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  btn.classList.add('active');
  const filters = document.getElementById('task-filters');
  const fab = document.getElementById('add-fab');
  const taskBadges = document.getElementById('filter-label').parentElement;
  if (tab === 'tasks') {
    filters.style.display = '';
    fab.classList.remove('fab-hidden');
    taskBadges.style.display = '';
  } else {
    filters.style.display = 'none';
    fab.classList.add('fab-hidden');
    taskBadges.style.display = 'none';
  }
  // Lazy-load tabs on first open
  if (tab === 'memory' && !memoryLoaded) loadMemory();
  if (tab === 'insights' && !insightsLoaded) loadInsights();
}

// ── TASKS CODE ──
const TAG_LABELS = { job: '\u{1F4BC} Job', finance: '\u{1F4B0} Finance', personal: '\u{1F464} Personal', roots: '\u{1F331} Roots', dev: '\u{1F5A5} Dev' };
const SECTION_LABELS = { inprogress: 'In Progress', todo: 'Todo', waiting: 'Waiting', done: 'Done' };
const SECTION_ORDER = ['inprogress', 'todo', 'waiting', 'done'];
let TASKS = { todo: [], inprogress: [], waiting: [], done: [] };
let currentSha = null;
let activeFilter = 'all';
let selectedTaskSection = null;
let selectedTaskIndex = null;

function parseTasks(md) {
  const result = { todo: [], inprogress: [], waiting: [], done: [] };
  let current = null;
  const lines = md.split('\n');
  for (let li = 0; li < lines.length; li++) {
    const raw = lines[li];
    const line = raw.trim();
    if (line === '## Todo') { current = 'todo'; continue; }
    if (line === '## In Progress') { current = 'inprogress'; continue; }
    if (line === '## Waiting') { current = 'waiting'; continue; }
    if (line === '## Done') { current = 'done'; continue; }
    if (line === "## Won't Do") { current = null; continue; }
    if (!current || !line.startsWith('- ')) continue;
    const text = line.slice(2);
    const titleRaw = text.replace(/&lt;!--.*?--&gt;/g, '').replace(/<!--.*?-->/g, '').replace(/^\u2705\s*/, '').trim();
    const commentMatch = text.match(/<!--(.+?)-->/);
    const meta = commentMatch ? commentMatch[1] : '';
    const tagMatch = meta.match(/tag:([\w]+)/);
    const estMatch = meta.match(/^([^,]+),/);
    const aiMatch = meta.match(/ai:([\w]+)/);
    let description = '';
    if (li + 1 < lines.length && lines[li + 1].startsWith('  - ')) {
      description = lines[li + 1].slice(4).trim();
      li++;
    }
    result[current].push({ title: titleRaw, tag: tagMatch ? tagMatch[1] : '', estimate: estMatch ? estMatch[1].trim() : '', ai: aiMatch ? aiMatch[1] : 'low', description });
  }
  return result;
}

function serializeTasks(tasks) {
  let md = '# TASKS.md\n<!-- OpenClaw task board \u2014 synced from Command -->\n<!-- Format: - Task description (estimate, tag:X, ai:level|model) -->\n\n';
  const sections = [['## Todo', tasks.todo],['## In Progress', tasks.inprogress],['## Waiting', tasks.waiting],['## Done', tasks.done]];
  for (const [header, items] of sections) {
    md += header + '\n\n';
    for (const t of items) {
      const prefix = header === '## Done' ? '- \u2705 ' : '- ';
      const est = t.estimate || '';
      const comment = est ? ` <!-- ${est}, tag:${t.tag}, ai:${t.ai} -->` : ` <!-- tag:${t.tag}, ai:${t.ai} -->`;
      md += `${prefix}${stripMd(t.title)}${comment}\n`;
      if (t.description) md += `  - ${t.description}\n`;
    }
    md += '\n';
  }
  md += "## Won't Do\n\n";
  return md;
}

async function fetchTasks() {
  setSyncStatus('Loading...', '');
  try {
    const meta = await fetch(`${API_BASE}/TASKS.md`, { headers: { Authorization: `token ${GITHUB_TOKEN}`, Accept: 'application/vnd.github.v3+json' } });
    if (!meta.ok) throw new Error('API error ' + meta.status);
    const metaJson = await meta.json();
    currentSha = metaJson.sha;
    const raw = await fetch(RAW_BASE + '/TASKS.md?t=' + Date.now());
    const md = await raw.text();
    TASKS = parseTasks(md);
    render();
    setSyncStatus('Updated ' + new Date().toLocaleTimeString(), '');
  } catch (e) {
    setSyncStatus('Load failed: ' + e.message, 'error');
  }
}

async function writeTasks(tasks) {
  setSyncStatus('Saving...', 'syncing');
  const md = serializeTasks(tasks);
  const encoded = btoa(unescape(encodeURIComponent(md)));
  try {
    const res = await fetch(`${API_BASE}/TASKS.md`, {
      method: 'PUT',
      headers: { Authorization: `token ${GITHUB_TOKEN}`, Accept: 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: 'Update TASKS.md from Command dashboard', content: encoded, sha: currentSha })
    });
    if (!res.ok) throw new Error('Write error ' + res.status);
    const data = await res.json();
    currentSha = data.content.sha;
    TASKS = tasks;
    render();
    setSyncStatus('Saved ' + new Date().toLocaleTimeString(), '');
  } catch (e) {
    setSyncStatus('Save failed: ' + e.message, 'error');
    throw e;
  }
}

function setSyncStatus(msg, cls) {
  const el = document.getElementById('sync-status');
  if (!el) return;
  el.textContent = msg;
  el.className = 'sync-indicator' + (cls ? ' ' + cls : '');
}

function setFilter(filter, btn) {
  activeFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const labels = { all: 'All', job: 'Job', finance: 'Finance', personal: 'Personal', roots: 'Roots', dev: 'Dev' };
  document.getElementById('filter-label').textContent = labels[filter] || 'All';
  render();
}

function filtered(tasks) { return activeFilter === 'all' ? tasks : tasks.filter(t => t.tag === activeFilter); }
function escHTML(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

let dragTaskId = null, dragFromSection = null, dragFromIndex = null;
function dragStart(e, section, index) {
  dragFromSection = section;
  dragFromIndex = index;
  dragTaskId = index;
  e.dataTransfer.effectAllowed = 'move';
  e.currentTarget.style.opacity = '0.5';
}
function allowDrop(e) { e.preventDefault(); e.currentTarget.closest('.column-cards').style.background='var(--border)'; }
function dragLeave(e) { e.currentTarget.closest('.column')?.querySelector('.column-cards')?.style && (e.currentTarget.closest('.column').querySelector('.column-cards').style.background=''); }
function dropOn(e, toSection) {
  e.preventDefault();
  const col = e.currentTarget.closest('.column-cards') || e.currentTarget;
  col.style.background = '';
  if (!dragFromSection || dragFromSection === toSection) return;
  moveTask(dragFromSection, dragFromIndex, toSection);
}
function toggleDoneCol() {
  const col = document.getElementById('done-col');
  const btn = document.getElementById('done-toggle-btn');
  if (!col) return;
  const showing = col.style.display !== 'none';
  col.style.display = showing ? 'none' : 'flex';
  col.style.flexDirection = 'column';
  const n = document.getElementById('d-done-count')?.textContent || '';
  btn.textContent = showing ? '📦 Show Done' : '📦 Hide Done';
}

function cardHTML(task, section, index) {
  const extra = section === 'inprogress' ? ' inprogress-card' : section === 'waiting' ? ' waiting-card' : '';
  const est = task.estimate ? `<span class="estimate">${task.estimate}</span>` : '';
  const tagLabel = TAG_LABELS[task.tag] || task.tag;
  const desc = task.description ? `<div class="card-desc">${escHTML(stripMd(task.description))}</div>` : '';
  return `<div class="card${extra}" draggable="true" ondragstart="dragStart(event, '${section}', ${index})" onclick="openCardSheet('${section}', ${index})">
    <div class="card-title">${escHTML(stripMd(task.title))}</div>${desc}
    <div class="card-meta"><span class="tag tag-${task.tag}">${tagLabel}</span>${est}<span class="ai-dot ai-${task.ai}" title="AI: ${task.ai}"></span></div>
  </div>`;
}

function render() {
  const mobile = document.getElementById('mobile-view');
  const doneToggle = document.getElementById('done-toggle-wrap');
  if (doneToggle) doneToggle.style.display = window.innerWidth >= 768 ? 'flex' : 'none';
  let mobileHTML = '';
  let first = true;
  for (const section of SECTION_ORDER) {
    const allTasks = TASKS[section] || [];
    const visibleTasks = allTasks.filter(t => (activeFilter === 'all' || t.tag === activeFilter) && (!searchQuery || (t.title||'').toLowerCase().includes(searchQuery) || (t.description||'').toLowerCase().includes(searchQuery)));
    if (!visibleTasks.length) continue;
    if (!first) mobileHTML += '<div class="divider"></div>';
    first = false;
    const taskCards = allTasks.map((t, i) => ({t, i})).filter(({t}) => (activeFilter === 'all' || t.tag === activeFilter) && (!searchQuery || (t.title||'').toLowerCase().includes(searchQuery) || (t.description||'').toLowerCase().includes(searchQuery))).map(({t, i}) => cardHTML(t, section, i)).join('');
    mobileHTML += `<div class="section"><div class="section-header"><span class="section-title">${SECTION_LABELS[section]}</span><span class="section-count">${visibleTasks.length}</span></div><div class="cards">${taskCards}</div></div>`;
  }
  if (!mobileHTML) mobileHTML = '<div class="empty">No tasks for this filter</div>';
  mobile.innerHTML = mobileHTML + '<div class="pb"></div>';
  for (const section of SECTION_ORDER) {
    const allTasks = TASKS[section] || [];
    const idMap = { inprogress: 'd-inprogress', todo: 'd-todo', waiting: 'd-waiting' };
    const countMap = { inprogress: 'd-ip-count', todo: 'd-todo-count', waiting: 'd-wait-count' };
    const el = document.getElementById(idMap[section]);
    const ct = document.getElementById(countMap[section]);
    const visibleCards = allTasks.map((t, i) => ({t, i})).filter(({t}) => (activeFilter === 'all' || t.tag === activeFilter) && (!searchQuery || (t.title||'').toLowerCase().includes(searchQuery) || (t.description||'').toLowerCase().includes(searchQuery))).map(({t, i}) => cardHTML(t, section, i)).join('');
    if (el) {
      el.innerHTML = visibleCards;
      const emptyEl = el.querySelector('.col-empty');
      if (emptyEl) emptyEl.style.display = visibleCards ? 'none' : 'block';
    }
    if (ct) ct.textContent = allTasks.filter(t => activeFilter === 'all' || t.tag === activeFilter).length;
  }
  const doneEl = document.getElementById('d-done');
  const doneCountEl = document.getElementById('d-done-count');
  if (doneEl && TASKS.done) {
    const doneCards = TASKS.done.map((t, i) => ({t, i})).filter(({t}) => (activeFilter === 'all' || t.tag === activeFilter) && (!searchQuery || (t.title||'').toLowerCase().includes(searchQuery) || (t.description||'').toLowerCase().includes(searchQuery))).map(({t, i}) => cardHTML(t, 'done', i)).join('');
    doneEl.innerHTML = doneCards || '<div class="col-empty" style="text-align:center;color:var(--muted);padding:32px 16px;font-size:13px">✅ Nothing done yet</div>';
    if (doneCountEl) doneCountEl.textContent = TASKS.done.filter(t => activeFilter === 'all' || t.tag === activeFilter).length;
  }
  ['d-inprogress','d-todo','d-waiting','d-done'].forEach((id, i) => {
    const secs = ['inprogress','todo','waiting','done'];
    const el = document.getElementById(id);
    if (el) {
      el.ondragover = allowDrop;
      el.ondragleave = dragLeave;
      el.ondrop = (e) => dropOn(e, secs[i]);
    }
  });
  document.getElementById('total-count').textContent = SECTION_ORDER.reduce((n, s) => n + filtered(TASKS[s] || []).length, 0);
}

function openCardSheet(section, index) {
  selectedTaskSection = section; selectedTaskIndex = index;
  const task = TASKS[section][index];
  document.getElementById('sheet-task-text').textContent = task.title;
  ['todo','inprogress','waiting','done'].forEach(s => { const btn = document.getElementById('mv-' + s); if (btn) btn.classList.toggle('active-section', s === section); });
  document.getElementById('card-backdrop').classList.add('open');
  document.getElementById('card-sheet').classList.add('open');
}
function closeCardSheet() {
  document.getElementById('card-backdrop').classList.remove('open');
  document.getElementById('card-sheet').classList.remove('open');
  selectedTaskSection = null; selectedTaskIndex = null;
}
async function moveTask(fromSection, fromIndex, targetSection) {
  if (!fromSection && selectedTaskSection && selectedTaskIndex !== null) {
    fromSection = selectedTaskSection;
    fromIndex = selectedTaskIndex;
  }
  if (!fromSection || fromIndex === null || fromIndex === undefined) return;
  if (fromSection === targetSection) { closeCardSheet(); return; }
  const newTasks = JSON.parse(JSON.stringify(TASKS));
  const [task] = newTasks[fromSection].splice(fromIndex, 1);
  newTasks[targetSection].push(task);
  closeCardSheet();
  await writeTasks(newTasks);
}
async function deleteTask() {
  if (!selectedTaskSection || selectedTaskIndex === null) return;
  const task = TASKS[selectedTaskSection][selectedTaskIndex];
  if (!confirm(`Delete "${stripMd(task.title)}"?`)) return;
  const newTasks = JSON.parse(JSON.stringify(TASKS));
  newTasks[selectedTaskSection].splice(selectedTaskIndex, 1);
  closeCardSheet();
  await writeTasks(newTasks);
}
function openAddSheet() {
  document.getElementById('new-title').value = ''; document.getElementById('new-desc').value = ''; document.getElementById('new-estimate').value = '';
  document.getElementById('new-tag').value = 'job'; document.getElementById('new-section').value = 'todo';
  document.getElementById('add-backdrop').classList.add('open'); document.getElementById('add-sheet').classList.add('open');
  setTimeout(() => document.getElementById('new-title').focus(), 300);
}
function closeAddSheet() { document.getElementById('add-backdrop').classList.remove('open'); document.getElementById('add-sheet').classList.remove('open'); }
async function submitAddTask() {
  const title = document.getElementById('new-title').value.trim();
  if (!title) { document.getElementById('new-title').focus(); return; }
  const description = document.getElementById('new-desc').value.trim();
  const tag = document.getElementById('new-tag').value;
  const estimate = document.getElementById('new-estimate').value.trim();
  const section = document.getElementById('new-section').value;
  const btn = document.getElementById('add-submit'); btn.disabled = true; btn.textContent = 'Saving...';
  const newTasks = JSON.parse(JSON.stringify(TASKS));
  newTasks[section].unshift({ title, description, tag, estimate, ai: 'medium' });
  closeAddSheet();
  try { await writeTasks(newTasks); } finally { btn.disabled = false; btn.textContent = 'Add Task'; }
}
function openEditSheet() {
  if (selectedTaskSection === null || selectedTaskIndex === null) return;
  const sec = selectedTaskSection, idx = selectedTaskIndex;
  closeCardSheet();
  const task = TASKS[sec][idx];
  document.getElementById('edit-title').value = task.title || '';
  document.getElementById('edit-desc').value = task.description || '';
  document.getElementById('edit-tag').value = task.tag || 'personal';
  document.getElementById('edit-estimate').value = task.estimate || '';
  selectedTaskSection = sec; selectedTaskIndex = idx;
  document.getElementById('edit-backdrop').classList.add('open'); document.getElementById('edit-sheet').classList.add('open');
  setTimeout(() => document.getElementById('edit-title').focus(), 300);
}
function closeEditSheet() { document.getElementById('edit-backdrop').classList.remove('open'); document.getElementById('edit-sheet').classList.remove('open'); }
async function submitEditTask() {
  const title = document.getElementById('edit-title').value.trim();
  if (!title) { document.getElementById('edit-title').focus(); return; }
  const description = document.getElementById('edit-desc').value.trim();
  const tag = document.getElementById('edit-tag').value;
  const estimate = document.getElementById('edit-estimate').value.trim();
  const btn = document.getElementById('edit-submit'); btn.disabled = true; btn.textContent = 'Saving...';
  const newTasks = JSON.parse(JSON.stringify(TASKS));
  const task = newTasks[selectedTaskSection][selectedTaskIndex];
  task.title = title; task.description = description; task.tag = tag; task.estimate = estimate;
  const sec = selectedTaskSection, idx = selectedTaskIndex;
  closeEditSheet();
  try { await writeTasks(newTasks); } finally { btn.disabled = false; btn.textContent = 'Save Changes'; }
}

// ── MEMORY ──
let memoryLoaded = false;
let memoryCache = {};
let peopleData = {}; // { 'personal': [{name, preview, content, file}], ... }
let activeCtxTab = 'profile';
let activePeopleGroup = 'all';

async function loadMemory() {
  memoryLoaded = true;
  // Load overview + sync meta in parallel
  try {
    const [overviewResult, syncMetaResult] = await Promise.all([
      ghFetch('data/memory/MEMORY.md'),
      ghFetch('data/sync-meta.json').catch(() => null)
    ]);
    if (syncMetaResult) {
      try {
        const meta = JSON.parse(syncMetaResult.content);
        const d = new Date(meta.lastSync);
        document.getElementById('overview-sync-meta').innerHTML =
          `🔄 Last synced: <strong>${d.toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'})} at ${d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}</strong>`;
      } catch(e) {
        document.getElementById('overview-sync-meta').textContent = 'Sync status unavailable';
      }
    } else {
      document.getElementById('overview-sync-meta').textContent = 'Sync status unavailable';
    }
    document.getElementById('overview-content').innerHTML = renderMarkdown(overviewResult.content);
  } catch(e) {
    document.getElementById('overview-content').innerHTML = errorBox('Failed to load — check connection', 'loadMemory()');
    document.getElementById('overview-sync-meta').textContent = '';
  }

  // Load context files
  const ctxFiles = ['profile', 'job-search', 'glossary', 'company'];
  for (const f of ctxFiles) {
    loadContextFile(f);
  }

  // Load people files
  loadPeopleFiles();
}

async function loadContextFile(name) {
  const el = document.getElementById('ctx-' + name);
  if (!el) return;
  el.innerHTML = '<div class="loading-screen"><div class="spinner"></div> Loading...</div>';
  try {
    const { content } = await ghFetch(`data/memory/context/${name}.md`);
    memoryCache['ctx-' + name] = content;
    el.innerHTML = renderMarkdown(content);
    el.dataset.raw = content;
  } catch(e) {
    el.innerHTML = errorBox('Failed to load — check connection', `loadContextFile('${name}')`);
  }
}

async function loadPeopleFiles() {
  const files = [
    { key: 'personal', path: 'data/memory/people/personal.md', label: 'Personal' },
    { key: 'roots-team', path: 'data/memory/people/roots-team.md', label: 'Roots Team' },
    { key: 'job-search', path: 'data/memory/people/job-search-contacts.md', label: 'Job Search' }
  ];
  peopleData = {};
  try {
    const results = await Promise.all(files.map(f => ghFetch(f.path).then(r => ({...f, content: r.content}))));
    for (const r of results) {
      const people = parsePeopleFile(r.content, r.key);
      peopleData[r.key] = people;
    }
    renderPeopleGrid(activePeopleGroup, document.getElementById('people-search').value);
  } catch(e) {
    document.getElementById('people-grid').innerHTML = errorBox('Failed to load people — check connection', 'loadPeopleFiles()');
  }
}

function parsePeopleFile(content, group) {
  const people = [];
  const sections = content.split(/^## /m).slice(1);
  for (const section of sections) {
    const lines = section.split('\n');
    const name = lines[0].trim();
    const body = lines.slice(1).join('\n').trim();
    const preview = body.replace(/^[-*] /gm, '').replace(/\*\*/g, '').split('\n').filter(l => l.trim()).slice(0, 3).join(' • ');
    people.push({ name, preview, content: '## ' + section, group });
  }
  return people;
}

function renderPeopleGrid(group, search) {
  const grid = document.getElementById('people-grid');
  let allPeople = [];
  if (group === 'all') {
    allPeople = Object.values(peopleData).flat();
  } else {
    allPeople = peopleData[group] || [];
  }
  if (search) {
    const q = search.toLowerCase();
    allPeople = allPeople.filter(p => p.name.toLowerCase().includes(q) || p.preview.toLowerCase().includes(q) || p.content.toLowerCase().includes(q));
  }
  if (!allPeople.length) {
    grid.innerHTML = '<div class="empty" style="grid-column:1/-1;">No people found</div>';
    return;
  }
  grid.innerHTML = allPeople.map((p, i) =>
    `<div class="person-card" onclick="openPersonModal(${JSON.stringify(p.name).replace(/"/g,'&quot;')}, ${JSON.stringify(p.content).replace(/"/g,'&quot;')})">
      <div class="person-name">${escHTML(p.name)}</div>
      <div class="person-preview">${escHTML(p.preview || 'Click to view details')}</div>
    </div>`
  ).join('');
}

function filterPeople(group, btn) {
  activePeopleGroup = group;
  document.querySelectorAll('.group-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderPeopleGrid(group, document.getElementById('people-search').value);
}

function searchPeople(query) {
  renderPeopleGrid(activePeopleGroup, query);
}

function switchMemoryTab(tab, btn) {
  document.querySelectorAll('.sub-tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.sub-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('mem-' + tab).classList.add('active');
}

function switchCtxTab(tab, btn) {
  activeCtxTab = tab;
  document.querySelectorAll('.ctx-tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.ctx-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('ctx-' + tab).classList.add('active');
  document.getElementById('ctx-search').value = '';
}

function filterContext(query) {
  const active = document.querySelector('.ctx-panel.active');
  if (!active) return;
  const raw = active.dataset.raw;
  if (!raw) return;
  if (!query) { active.innerHTML = renderMarkdown(raw); active.dataset.raw = raw; return; }
  const q = query.toLowerCase();
  const lines = raw.split('\n').filter(l => l.toLowerCase().includes(q) || l.startsWith('#'));
  active.innerHTML = renderMarkdown(lines.join('\n'));
}

function openPersonModal(name, content) {
  document.getElementById('person-modal-title').textContent = name;
  document.getElementById('person-modal-body').innerHTML = renderMarkdown(content);
  document.getElementById('person-modal-backdrop').classList.add('open');
}
function closePersonModal() {
  document.getElementById('person-modal-backdrop').classList.remove('open');
}

// ── INSIGHTS ──
let insightsLoaded = false;
let insightFiles = [];

async function loadInsights() {
  insightsLoaded = true;
  const listEl = document.getElementById('insight-list');
  try {
    const { dir } = await ghFetch('data/insights');
    insightFiles = dir.filter(f => f.name.endsWith('.md')).sort((a, b) => b.name.localeCompare(a.name));
    if (!insightFiles.length) {
      listEl.innerHTML = '<li class="empty">No insights yet — check back Saturday morning</li>';
      document.getElementById('insights-content-area').innerHTML = '<div class="empty">No insights yet — check back Saturday morning</div>';
      return;
    }
    listEl.innerHTML = insightFiles.map((f, i) =>
      `<li class="insight-list-item${i === 0 ? ' active' : ''}" onclick="loadInsight('${f.path}', this)">${formatInsightDate(f.name)}</li>`
    ).join('');
    // Load first insight
    loadInsight(insightFiles[0].path, listEl.querySelector('.insight-list-item'));
  } catch(e) {
    listEl.innerHTML = '<li class="empty" style="color:#ef4444">Failed to load</li>';
    document.getElementById('insights-content-area').innerHTML = errorBox('Failed to load insights — check connection', 'loadInsights()');
  }
}

async function loadInsight(path, listItem) {
  document.querySelectorAll('.insight-list-item').forEach(li => li.classList.remove('active'));
  if (listItem) listItem.classList.add('active');
  const contentArea = document.getElementById('insights-content-area');
  contentArea.innerHTML = '<div class="loading-screen"><div class="spinner"></div> Loading...</div>';
  try {
    const { content } = await ghFetch(path);
    contentArea.innerHTML = renderMarkdown(content);
  } catch(e) {
    contentArea.innerHTML = errorBox('Failed to load — check connection', `loadInsight('${path}', null)`);
  }
}

function formatInsightDate(filename) {
  const m = filename.match(/(\d{4})-(\d{2})-(\d{2})/);
  if (!m) return filename;
  const d = new Date(parseInt(m[1]), parseInt(m[2])-1, parseInt(m[3]));
  return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
}

function errorBox(msg, retryFn) {
  return `<div class="error-box">${escHTML(msg)}<br><button class="retry-btn" onclick="${retryFn}">Retry</button></div>`;
}

// ── SEARCH FILTER ──
let searchQuery = '';
function filterBySearch(q) {
  searchQuery = q.toLowerCase();
  renderTasks();
}

// ── KEYBOARD SHORTCUTS ──
document.addEventListener('keydown', function(e) {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
    if (e.key === 'Escape') { e.target.blur(); closeModal(); }
    return;
  }
  if (e.key === 'n') { openNewTaskForm(); }
  else if (e.key === '1') { switchTab('tasks', document.querySelector('.nav-tab')); }
  else if (e.key === '2') { switchTab('memory', document.querySelectorAll('.nav-tab')[1]); }
  else if (e.key === '3') { switchTab('insights', document.querySelectorAll('.nav-tab')[2]); }
  else if (e.key === '/') { e.preventDefault(); const s = document.getElementById('task-search'); if(s) s.focus(); }
  else if (e.key === 'Escape') { closeModal(); }
});

function openNewTaskForm() {
  openAddSheet();
}

// ── INIT ──
render();
fetchTasks();
setInterval(fetchTasks, 60000);
</script>
